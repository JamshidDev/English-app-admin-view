name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: dist/*
          target: /var/www/English-app-admin-view
          strip_components: 1
          rm: true

  notify:
    name: 📢 Notify
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Sanitize commit message
        id: sanitize
        run: |
          MSG="${{ github.event.head_commit.message }}"
          MSG="${MSG//&/&amp;}"
          MSG="${MSG//</&lt;}"
          MSG="${MSG//>/&gt;}"
          echo "message=$MSG" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            <b>EasyEnglish Admin Panel</b>

            ${{ needs.build.result == 'success' && needs.deploy.result == 'success' && '✅ Deploy muvaffaqiyatli!' || '❌ Deploy muvaffaqiyatsiz!' }}

            📦 <b>Commit:</b> <code>${{ github.sha }}</code>
            👤 <b>Author:</b> ${{ github.actor }}
            💬 <b>Message:</b> ${{ steps.sanitize.outputs.message }}

            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 GitHub Actions</a>
